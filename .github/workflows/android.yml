
name: Android CI (Debian container with expect)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm-slim
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (JDK, expect, etc.)
        run: |
          apt-get update
          apt-get install -y wget unzip git openjdk-17-jdk-headless expect

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-12266719_latest.zip
          unzip -q commandlinetools-linux-*.zip -d $HOME/android/cmdline-tools
          mv $HOME/android/cmdline-tools/cmdline-tools $HOME/android/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android" >> $GITHUB_ENV
          echo "PATH=$PATH:$HOME/android/cmdline-tools/latest/bin:$HOME/android/platform-tools" >> $GITHUB_ENV

      # ✅ 用 expect 自动接受所有许可证
      - name: Accept Android SDK licenses
        run: |
          expect -c '
            set timeout 30
            spawn sdkmanager --licenses
            expect {
              "Accept? (y/N):" { send "y\r"; exp_continue }
              eof
            }
          '

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.4"

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore keystore.jks \
            -alias release -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=CI Builder, OU=Dev, O=Company, L=City, ST=State, C=XX"

      - name: Grant permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: release
          KEY_PASSWORD: android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk

